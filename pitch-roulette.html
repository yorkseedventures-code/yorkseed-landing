<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Pitch Roulette · Yorkseed</title>
<meta name="robots" content="noindex,nofollow"/>
<style>
/* Reset EVERYTHING the site might inject */
#pr-root, #pr-root * {
  all: revert;
  box-sizing: border-box;
}
#pr-root {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 300;
  color: #0e0e0e;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  background: #fafafa;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="pr-root"></div>

<script>
// Build the entire app inside a shadow root so NOTHING from the site can touch it
var root = document.getElementById('pr-root');
var shadow = root.attachShadow({mode: 'open'});

shadow.innerHTML = `
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:host {
  --ink: #0e0e0e; --ink2: #1a1a1a; --ink3: #555; --ink4: #999;
  --white: #fff; --off: #fafafa; --light: #f5f4f1;
  --red: #c8372d; --red-dim: rgba(200,55,45,.06); --red-border: rgba(200,55,45,.18);
  --gold: #b08d57; --gold-dim: rgba(176,141,87,.07); --gold-border: rgba(176,141,87,.22);
  --border: rgba(0,0,0,.07); --border2: rgba(0,0,0,.12);
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  display: block;
  font-family: var(--sans);
  background: var(--off);
  min-height: 100vh;
}
a { text-decoration: none; color: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 500; background: rgba(255,255,255,.97); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); height: 64px; display: flex; align-items: center; padding: 0 5vw; justify-content: space-between; }
.n-logo img { height: 24px; width: auto; }
.n-right { display: flex; align-items: center; gap: 8px; }
.n-link { font-size: 12.5px; color: var(--ink3); padding: 6px 10px; border-radius: 5px; cursor: pointer; }
.n-link:hover { color: var(--ink); background: rgba(0,0,0,.04); }
.n-join { background: var(--red); color: #fff; padding: 8px 18px; border-radius: 6px; font-size: 12.5px; cursor: pointer; }
.n-join:hover { opacity: .88; }

/* PAGE */
.wrap { max-width: 760px; margin: 0 auto; padding: 88px 5vw 60px; }
.eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ''; display: block; width: 18px; height: 1px; background: var(--red); opacity: .5; }
h1 { font-family: var(--serif); font-size: clamp(28px,5vw,48px); font-weight: 400; line-height: 1.1; letter-spacing: -.02em; margin-bottom: 6px; }
h1 em { font-style: italic; color: var(--red); }
.sub { font-size: 14px; color: var(--ink4); font-family: var(--mono); letter-spacing: .04em; margin-bottom: 32px; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.sync-wrap { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--mono); color: var(--ink4); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; }
.sync-dot.live { background: #1a8a5a; animation: sdp 2s infinite; }
@keyframes sdp { 0%,100%{opacity:1} 50%{opacity:.4} }

/* CARD */
.card { background: #fff; border: 0.5px solid var(--border2); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
.lbl { font-size: 9px; font-family: var(--mono); letter-spacing: .16em; text-transform: uppercase; color: var(--red); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.lbl::before { content: ''; display: block; width: 14px; height: 1px; background: var(--red); opacity: .5; }
.flbl { font-size: 11px; font-family: var(--mono); letter-spacing: .08em; color: var(--ink4); margin-bottom: 5px; display: block; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

/* INPUTS */
input[type=text], input[type=password], input[type=number], textarea, select {
  width: 100%; padding: 10px 14px; border: 0.5px solid var(--border2); border-radius: 8px;
  font-size: 14px; font-family: var(--sans); background: #fff; color: var(--ink);
  outline: none; resize: none; -webkit-appearance: none; appearance: none; display: block;
}
input:focus, textarea:focus, select:focus { border-color: var(--red); }

/* CHOICE BUTTONS */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.cbtn { padding: 14px 10px; border-radius: 10px; border: 0.5px solid var(--border2); background: #fff; cursor: pointer; text-align: center; position: relative; user-select: none; -webkit-user-select: none; display: block; }
.cbtn:hover { border-color: var(--red); background: var(--red-dim); }
.cbtn.sel { border: 1.5px solid var(--red); background: var(--red-dim); }
.cbtn.dis { opacity: .5; cursor: not-allowed; pointer-events: none; }
.cbtn-t { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.cbtn.sel .cbtn-t { color: var(--red); }
.cbtn-s { font-size: 10px; font-family: var(--mono); color: var(--ink4); }
.cbtn-sp { font-size: 11px; font-family: var(--mono); margin-top: 6px; font-weight: 500; }
.sp-open { color: #1a8a5a; } .sp-low { color: var(--gold); } .sp-full { color: var(--red); }
.ctag { font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 3px; position: absolute; top: 8px; right: 8px; }
.tag-full { background: var(--red-dim); color: var(--red); }
.tag-closed { background: rgba(0,0,0,.06); color: var(--ink4); }

/* BUTTONS */
button { font-family: var(--sans); cursor: pointer; -webkit-appearance: none; appearance: none; border: none; display: flex; align-items: center; justify-content: center; }
.btn { width: 100%; padding: 11px 20px; border-radius: 8px; font-size: 13px; border: 0.5px solid var(--border2); background: #fff; color: var(--ink); cursor: pointer; }
.btn:hover { background: var(--off); }
.btn-red { background: var(--red); color: #fff; border-color: var(--red); }
.btn-red:hover { opacity: .88; }
.btn-dark { background: var(--ink); color: #fff; border-color: var(--ink); }
.btn-dark:hover { opacity: .85; }
.btn-sm { width: auto; padding: 7px 14px; font-size: 11px; font-family: var(--mono); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* STATUS */
.st { font-size: 11px; font-family: var(--mono); text-align: center; padding: 8px; min-height: 20px; color: var(--ink4); }
.st.ok { color: #1a8a5a; } .st.err { color: var(--red); }

/* TABS */
.tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 16px; }
.tab { padding: 8px 16px; font-size: 11px; font-family: var(--mono); letter-spacing: .08em; cursor: pointer; color: var(--ink4); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
.tab.on { color: var(--ink); border-bottom-color: var(--red); }

/* PITCHER ITEMS */
.pi { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--off); border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
.pi-num { font-family: var(--mono); font-size: 11px; color: var(--red); font-weight: 600; min-width: 20px; }
.pi-info { flex: 1; min-width: 0; }
.pi-name { font-size: 13px; font-weight: 500; }
.pi-meta { font-size: 10px; color: var(--ink4); font-family: var(--mono); margin-top: 1px; }
.pill { font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.pill-f { background: var(--red-dim); color: var(--red); }
.pill-i { background: var(--gold-dim); color: var(--gold); }
.rm { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 2px 6px; line-height: 1; }
.rm:hover { color: var(--red); }

/* SLIDERS */
.sb { margin-bottom: 18px; }
.sb-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.sb-name { font-size: 13px; font-weight: 500; }
.sb-val { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--red); }
.sb.extra .sb-val { color: var(--gold); }
input[type=range] { width: 100%; accent-color: var(--red); cursor: pointer; display: block; height: 20px; }
.sb.extra input[type=range] { accent-color: var(--gold); }
.ticks { display: flex; justify-content: space-between; padding: 0 2px; }
.tick { font-size: 9px; font-family: var(--mono); color: #ccc; }
.tick.on { color: var(--red); font-weight: 600; }
.sb.extra .tick.on { color: var(--gold); }

/* HOST CONTROLS */
.hcg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.hcc { padding: 16px; background: #fff; border: 0.5px solid var(--border2); border-radius: 10px; }
.hcc-lbl { font-size: 9px; font-family: var(--mono); letter-spacing: .12em; text-transform: uppercase; color: var(--ink4); margin-bottom: 6px; }
.hcc-val { font-size: 22px; font-weight: 600; font-family: var(--mono); margin-bottom: 2px; }
.hcc-sub { font-size: 10px; font-family: var(--mono); color: var(--ink4); }
.cv-g { color: #1a8a5a; } .cv-go { color: var(--gold); } .cv-r { color: var(--red); }
.sc { padding: 16px 18px; background: #fff; border: 0.5px solid var(--border2); border-radius: 10px; margin-bottom: 8px; }
.sc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sc-name { font-size: 13px; font-weight: 500; }
.sc-cnt { font-family: var(--mono); font-size: 12px; color: var(--ink4); }
.sc-row { display: flex; align-items: center; gap: 10px; }
.sbar { height: 6px; background: var(--light); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.sbar-f { height: 100%; border-radius: 3px; transition: width .4s, background .3s; }
.trow { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #fff; border: 0.5px solid var(--border2); border-radius: 10px; margin-bottom: 8px; }
.trow-info .trow-t { font-size: 13px; font-weight: 500; }
.trow-info .trow-s { font-size: 11px; font-family: var(--mono); color: var(--ink4); margin-top: 2px; }
.tswitch { position: relative; width: 44px; height: 24px; flex-shrink: 0; margin-left: 12px; cursor: pointer; }
.tswitch input { opacity: 0; width: 0; height: 0; position: absolute; }
.tslider { position: absolute; inset: 0; background: #ddd; border-radius: 24px; cursor: pointer; transition: background .2s; }
.tslider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
.tswitch input:checked + .tslider { background: var(--red); }
.tswitch input:checked + .tslider:before { transform: translateX(20px); }

/* NOTIFS */
.nfeed { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
.ni { padding: 10px 14px; background: var(--off); border: 0.5px solid var(--border); border-radius: 8px; display: flex; align-items: flex-start; gap: 10px; }
.ni-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 4px; }
.ni-txt { font-size: 12px; color: var(--ink3); line-height: 1.5; flex: 1; }
.ni-txt strong { color: var(--ink); font-weight: 500; }
.ni-t { font-size: 10px; font-family: var(--mono); color: #ccc; flex-shrink: 0; }
.ne { font-size: 12px; color: #ccc; text-align: center; padding: 20px; font-family: var(--mono); }
.hp { background: #fff; border: 0.5px solid var(--border2); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.hph { padding: 12px 18px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
.hph-t { font-size: 11px; font-family: var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--ink3); }
.nc { font-size: 10px; font-family: var(--mono); background: var(--red); color: #fff; border-radius: 10px; padding: 2px 7px; min-width: 20px; text-align: center; }
.ssh { font-size: 10px; font-family: var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--ink4); padding: 8px 0 6px; border-top: 0.5px solid var(--border); margin-top: 4px; }
.ssh:first-child { border-top: none; margin-top: 0; }

/* RESULTS */
.rl { display: flex; flex-direction: column; gap: 8px; }
.rc { padding: 14px 16px; background: #fff; border: 0.5px solid var(--border); border-radius: 10px; display: flex; align-items: center; gap: 14px; }
.rc.win { border-color: var(--gold-border); background: var(--gold-dim); }
.rk { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 12px; font-weight: 600; flex-shrink: 0; }
.r1 { background: var(--gold); color: #fff; } .r2 { background: #888; color: #fff; } .r3 { background: #a0522d; color: #fff; } .rn { background: var(--off); color: var(--ink4); border: 0.5px solid var(--border); }
.ri { flex: 1; min-width: 0; }
.ri-n { font-size: 14px; font-weight: 500; }
.ri-m { font-size: 10px; color: var(--ink4); font-family: var(--mono); margin-top: 1px; }
.rs { text-align: right; flex-shrink: 0; }
.rs-t { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--red); }
.rs-b { font-size: 10px; font-family: var(--mono); color: var(--ink4); margin-top: 2px; }
.wb { padding: 18px 20px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 12px; text-align: center; margin-bottom: 14px; }
.wb-l { font-size: 9px; font-family: var(--mono); letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.wb-n { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
.wb-c { font-size: 12px; font-family: var(--mono); color: var(--ink4); margin-bottom: 6px; }
.wb-s { font-size: 13px; font-family: var(--mono); color: var(--gold); }

.ld { text-align: center; padding: 20px; font-size: 12px; font-family: var(--mono); color: #ccc; }
.sc-closed { padding: 24px; text-align: center; }
.sc-closed-i { font-size: 32px; margin-bottom: 10px; }
.sc-closed-t { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.sc-closed-s { font-size: 12px; font-family: var(--mono); color: var(--ink4); }

/* PASSCODE */
.po { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.pb { background: #fff; border-radius: 16px; padding: 28px 24px; width: 300px; text-align: center; }
.pb-t { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.pb-s { font-size: 12px; color: var(--ink4); font-family: var(--mono); margin-bottom: 18px; }
.pb-e { font-size: 11px; color: var(--red); font-family: var(--mono); min-height: 16px; margin-bottom: 8px; }

.view { display: none; } .view.on { display: block; }
@media(max-width:600px){ .frow { grid-template-columns: 1fr; } }
</style>

<nav>
  <a href="/"><img src="${LOGO}" alt="Yorkseed" style="height:24px;width:auto"></a>
  <div class="n-right">
    <a href="/events.html" class="n-link">Events</a>
    <a href="https://app.yorkseed.co/login" class="n-link">Sign in</a>
    <a href="https://app.yorkseed.co/pricing" class="n-join">Join</a>
  </div>
</nav>

<div class="po" id="po" style="display:none">
  <div class="pb">
    <div class="pb-t">Host Access</div>
    <div class="pb-s">Enter passcode to continue</div>
    <input type="password" id="pc-in" placeholder="••••••••" style="text-align:center;letter-spacing:.1em;font-family:var(--mono);font-size:16px;margin-bottom:10px">
    <div class="pb-e" id="pc-err"></div>
    <button class="btn btn-dark" id="pc-btn" style="margin-bottom:8px">Unlock →</button>
    <button class="btn" id="pc-cancel" style="margin-top:4px">Cancel</button>
  </div>
</div>

<div class="wrap">
  <div class="eyebrow">Yorkseed · Live Event</div>
  <h1>Pitch <em>Roulette</em></h1>
  <p class="sub">60-second pitches · Sign up, score, and see who wins</p>
  <div class="topbar">
    <div class="sync-wrap"><div class="sync-dot" id="sd"></div>Live</div>
    <button class="btn btn-sm" id="hbtn">Host View</button>
  </div>

  <div class="view on" id="v-audience">
    <div class="tabs">
      <div class="tab on" id="t-signup">Sign Up to Pitch</div>
      <div class="tab" id="t-score">Score a Pitcher</div>
    </div>

    <div id="p-signup">
      <div id="closed-card" class="card" style="display:none">
        <div class="sc-closed"><div class="sc-closed-i">🔒</div><div class="sc-closed-t">Sign-ups are closed</div><div class="sc-closed-s">Pitching is in progress — scoring still open!</div></div>
      </div>
      <div id="signup-wrap">
        <div class="card">
          <div class="lbl">Register to Pitch</div>
          <div class="frow">
            <div><label class="flbl">Your Name</label><input type="text" id="rn" placeholder="e.g. Jessica Wong"></div>
            <div><label class="flbl">Company / Fund</label><input type="text" id="rc" placeholder="e.g. Yorkseed"></div>
          </div>
          <label class="flbl" style="margin-bottom:8px">I am a...</label>
          <div class="grid2">
            <div class="cbtn" id="t-founder"><div class="cbtn-t" style="font-size:13px">Founder</div><div class="cbtn-s">Company</div></div>
            <div class="cbtn" id="t-investor"><div class="cbtn-t" style="font-size:13px">Investor</div><div class="cbtn-s">Fund</div></div>
          </div>
          <label class="flbl" style="margin-bottom:8px">Time Slot</label>
          <div class="grid2" id="slot-btns">
            <div class="cbtn"><div class="cbtn-t">2:30 – 3:00</div><div class="cbtn-s">Afternoon</div><div class="cbtn-sp">Loading...</div></div>
            <div class="cbtn"><div class="cbtn-t">3:30 – 4:00</div><div class="cbtn-s">Late Afternoon</div><div class="cbtn-sp">Loading...</div></div>
          </div>
          <button class="btn btn-red" id="reg-btn">Add Me to the List →</button>
          <div class="st" id="reg-st"></div>
        </div>
        <div class="card">
          <div class="lbl">Pitch Queue</div>
          <div id="pub-q"><div class="ld">Loading...</div></div>
        </div>
      </div>
    </div>

    <div id="p-score" style="display:none">
      <div class="card">
        <div class="lbl">Score a Pitcher</div>
        <div style="margin-bottom:14px">
          <label class="flbl" style="margin-bottom:6px">Select Pitcher</label>
          <select id="sc-sel"><option value="">— loading pitchers —</option></select>
        </div>
        <div class="sb">
          <div class="sb-top"><span class="sb-name">Overall Score</span><span class="sb-val" id="v-overall">5</span></div>
          <input type="range" min="1" max="10" value="5" step="1" id="sl-overall">
          <div class="ticks" id="tk-overall"></div>
        </div>
        <div class="sb">
          <div class="sb-top"><span class="sb-name">Delivery &amp; Energy</span><span class="sb-val" id="v-delivery">5</span></div>
          <input type="range" min="1" max="10" value="5" step="1" id="sl-delivery">
          <div class="ticks" id="tk-delivery"></div>
        </div>
        <div class="sb extra">
          <div class="sb-top"><span class="sb-name" style="color:var(--gold)">Extra Points <span style="font-size:10px;font-family:var(--mono);color:#ccc">(your call)</span></span><span class="sb-val" id="v-extra">0</span></div>
          <input type="range" min="0" max="10" value="0" step="1" id="sl-extra" style="accent-color:var(--gold)">
          <div class="ticks" id="tk-extra"></div>
          <div style="margin-top:10px">
            <label class="flbl" style="margin-bottom:5px;color:var(--gold)">Reason <span style="color:#ccc;font-size:9px">optional</span></label>
            <textarea id="extra-rsn" placeholder="Why are you giving extra points?" rows="2" style="font-size:13px"></textarea>
          </div>
        </div>
        <div style="margin-top:4px">
          <label class="flbl" style="margin-bottom:5px">Your name (optional)</label>
          <input type="text" id="scr-name" placeholder="Anonymous">
        </div>
        <button class="btn btn-red" id="sc-btn" style="margin-top:12px">Submit Score →</button>
        <div class="st" id="sc-st"></div>
      </div>
    </div>
  </div>

  <div class="view" id="v-host">
    <div class="card">
      <div class="lbl">Sign-up Controls</div>
      <div class="trow" style="margin-bottom:12px">
        <div class="trow-info"><div class="trow-t">Sign-ups Open</div><div class="trow-s" id="sig-sub">People can register to pitch</div></div>
        <label class="tswitch"><input type="checkbox" id="tog-sig" checked><span class="tslider"></span></label>
      </div>
      <div class="sc">
        <div class="sc-top"><div class="sc-name">2:30 – 3:00 PM</div><div class="sc-cnt" id="cnt-a">—</div></div>
        <div class="sc-row">
          <label class="flbl" style="margin-bottom:0;white-space:nowrap">Max spots:</label>
          <input type="number" id="max-a" min="1" max="30" value="5" style="width:70px;text-align:center;font-family:var(--mono);font-size:16px;font-weight:600;padding:8px">
          <button class="btn btn-dark btn-sm" id="save-a">Save</button>
        </div>
        <div class="sbar" style="margin-top:10px"><div class="sbar-f" id="bar-a" style="width:0%;background:#1a8a5a"></div></div>
      </div>
      <div class="sc" style="margin-bottom:0">
        <div class="sc-top"><div class="sc-name">3:30 – 4:00 PM</div><div class="sc-cnt" id="cnt-b">—</div></div>
        <div class="sc-row">
          <label class="flbl" style="margin-bottom:0;white-space:nowrap">Max spots:</label>
          <input type="number" id="max-b" min="1" max="30" value="5" style="width:70px;text-align:center;font-family:var(--mono);font-size:16px;font-weight:600;padding:8px">
          <button class="btn btn-dark btn-sm" id="save-b">Save</button>
        </div>
        <div class="sbar" style="margin-top:10px"><div class="sbar-f" id="bar-b" style="width:0%;background:#1a8a5a"></div></div>
      </div>
    </div>
    <div class="hcg">
      <div class="hcc"><div class="hcc-lbl">2:30 PM</div><div class="hcc-val cv-g" id="stat-a">—</div><div class="hcc-sub" id="stat-a-s">loading...</div></div>
      <div class="hcc"><div class="hcc-lbl">3:30 PM</div><div class="hcc-val cv-g" id="stat-b">—</div><div class="hcc-sub" id="stat-b-s">loading...</div></div>
    </div>
    <div class="hp">
      <div class="hph"><div class="hph-t">Live Activity</div><div class="nc" id="n-cnt">0</div><div style="font-size:10px;font-family:var(--mono);color:#ccc;margin-left:auto" id="last-sync">Syncing...</div></div>
      <div style="padding:14px 18px"><div class="nfeed" id="nfeed"><div class="ne">Waiting for activity...</div></div></div>
    </div>
    <div class="card"><div class="lbl">Pitcher List</div><div id="host-q"><div class="ld">Loading...</div></div></div>
    <button class="btn btn-dark" id="calc-btn" style="margin-bottom:12px">Calculate Results →</button>
    <div id="results" style="display:none">
      <div id="winner-div"></div>
      <div class="card"><div class="lbl">Final Scores</div><div class="rl" id="rl"></div></div>
    </div>
  </div>
</div>
`;

// Replace logo placeholder
shadow.innerHTML = shadow.innerHTML.replace('${LOGO}', ${JSON.stringify(logo)});

// Now wire up all JS inside shadow
var $ = function(id){ return shadow.getElementById(id); };

var BASE='appqNjrGaE5HPWUzh';
var TOKEN='patNUpyVduxl5Tkxx.ad50a79c42b072db2778110c0a3f87190dbc178db2111f5da39b923298048044';
var API='https://api.airtable.com/v0/'+BASE+'/';
var PASSCODE='cappucino';
var SLOTS={a:{label:'2:30 – 3:00 PM',short:'2:30–3pm'},b:{label:'3:30 – 4:00 PM',short:'3:30–4pm'}};
var selSlot=null,selType=null,hostUnlocked=false;
var pitchers=[],notifs=[],seen=new Set();
var cfg={open:true,maxA:5,maxB:5,rSig:null,rA:null,rB:null};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hdrs(){return{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};}
async function api(path,opts){var r=await fetch(API+path,Object.assign({headers:hdrs()},opts||{}));if(!r.ok){var e=await r.json();throw new Error(e.error&&e.error.message||r.status);}return r.json();}

// Wire events after shadow DOM is ready
function wire(){
  // Passcode
  $('pc-btn').onclick=checkPasscode;
  $('pc-cancel').onclick=function(){$('po').style.display='none';};
  $('pc-in').onkeydown=function(e){if(e.key==='Enter')checkPasscode();};
  // Host btn
  $('hbtn').onclick=tryHost;
  // Tabs
  $('t-signup').onclick=function(){switchTab('signup');};
  $('t-score').onclick=function(){switchTab('score');};
  // Type btns
  $('t-founder').onclick=function(){selType='founder';$('t-founder').classList.add('sel');$('t-investor').classList.remove('sel');};
  $('t-investor').onclick=function(){selType='investor';$('t-investor').classList.add('sel');$('t-founder').classList.remove('sel');};
  // Register
  $('reg-btn').onclick=registerPitcher;
  // Score
  $('sc-btn').onclick=submitScore;
  // Sliders
  $('sl-overall').oninput=function(){updateSlider('overall',false);};
  $('sl-delivery').oninput=function(){updateSlider('delivery',false);};
  $('sl-extra').oninput=function(){updateSlider('extra',true);};
  // Host controls
  $('tog-sig').onchange=function(){cfg.open=$('tog-sig').checked;renderSignupState();if(cfg.rSig)patchCfg(cfg.rSig,cfg.open?'true':'false');};
  $('save-a').onclick=function(){saveMax('a');};
  $('save-b').onclick=function(){saveMax('b');};
  $('calc-btn').onclick=showResults;
}

async function loadConfig(){
  try{
    var d=await api('Config');
    d.records.forEach(function(r){var k=r.fields.Key,v=r.fields.Value;
      if(k==='signupsOpen'){cfg.open=v==='true';cfg.rSig=r.id;}
      if(k==='maxA'){cfg.maxA=parseInt(v)||5;cfg.rA=r.id;}
      if(k==='maxB'){cfg.maxB=parseInt(v)||5;cfg.rB=r.id;}
    });
    if(!cfg.rSig)api('Config',{method:'POST',body:JSON.stringify({records:[{fields:{Key:'signupsOpen',Value:'true'}}]})}).then(function(r){cfg.rSig=r.records[0].id;});
    if(!cfg.rA)api('Config',{method:'POST',body:JSON.stringify({records:[{fields:{Key:'maxA',Value:'5'}}]})}).then(function(r){cfg.rA=r.records[0].id;});
    if(!cfg.rB)api('Config',{method:'POST',body:JSON.stringify({records:[{fields:{Key:'maxB',Value:'5'}}]})}).then(function(r){cfg.rB=r.records[0].id;});
  }catch(e){console.error('cfg',e);}
}
async function patchCfg(id,val){try{await api('Config/'+id,{method:'PATCH',body:JSON.stringify({fields:{Value:val}})});}catch(e){console.error(e);}}
async function saveMax(slot){
  var inp=$(slot==='a'?'max-a':'max-b');
  var val=Math.max(1,Math.min(30,parseInt(inp.value)||5));inp.value=val;
  if(slot==='a'){cfg.maxA=val;if(cfg.rA)await patchCfg(cfg.rA,String(val));}
  else{cfg.maxB=val;if(cfg.rB)await patchCfg(cfg.rB,String(val));}
  renderSlots();renderStats();
}

async function loadPitchers(){
  try{var d=await api('Pitchers?sort%5B0%5D%5Bfield%5D=Name');
    pitchers=d.records.map(function(r){return{id:r.id,name:r.fields.Name||'',company:r.fields.Company||'',type:r.fields.Type||'founder',slot:r.fields.Slot||'a'};});
    renderPubQ();renderHostQ();renderScSel();renderSlots();renderStats();
  }catch(e){console.error(e);}
}

function cnt(s){return pitchers.filter(function(p){return(p.slot||'a')===s;}).length;}

function renderSlots(){
  var ca=cnt('a'),cb=cnt('b'),ma=cfg.maxA,mb=cfg.maxB;
  function mk(s,c,m,time,sub){
    var full=c>=m,locked=!cfg.open,dis=full||locked;
    var cls='cbtn'+(selSlot===s?' sel':'')+(dis?' dis':'');
    var rem=m-c,sc=rem<=0?'sp-full':rem<=2?'sp-low':'sp-open';
    var st=full?'Full':locked?'Closed':rem+' spot'+(rem!==1?'s':'')+' left';
    var tag=full?'<span class="ctag tag-full">Full</span>':locked?'<span class="ctag tag-closed">Closed</span>':'';
    var id='slot-'+s;
    return '<div class="'+cls+'" id="'+id+'">'+tag+'<div class="cbtn-t">'+time+'</div><div class="cbtn-s">'+sub+'</div><div class="cbtn-sp '+sc+'">'+st+'</div></div>';
  }
  $('slot-btns').innerHTML=mk('a',ca,ma,'2:30 – 3:00','Afternoon')+mk('b',cb,mb,'3:30 – 4:00','Late Afternoon');
  // Wire slot clicks after render
  var sa=$('slot-a'),sb=$('slot-b');
  if(sa&&!sa.classList.contains('dis'))sa.onclick=function(){selSlot='a';renderSlots();};
  if(sb&&!sb.classList.contains('dis'))sb.onclick=function(){selSlot='b';renderSlots();};
}

function renderStats(){
  var ca=cnt('a'),cb=cnt('b'),ma=cfg.maxA,mb=cfg.maxB;
  function set(vid,sid,bid,cntId,c,m){
    var el=$(vid);if(!el)return;
    el.textContent=c+' / '+m;el.className='hcc-val '+(c>=m?'cv-r':c>=m-2?'cv-go':'cv-g');
    $(sid).textContent=(m-c)+' spot'+(m-c!==1?'s':'')+' remaining';
    var pct=m>0?Math.min(100,Math.round(c/m*100)):0;
    var bar=$(bid);if(bar){bar.style.width=pct+'%';bar.style.background=pct>=100?'#c8372d':pct>=80?'#b08d57':'#1a8a5a';}
    $(cntId).textContent=c+' / '+m+' filled';
  }
  set('stat-a','stat-a-s','bar-a','cnt-a',ca,ma);
  set('stat-b','stat-b-s','bar-b','cnt-b',cb,mb);
  var ia=$('max-a'),ib=$('max-b');
  if(ia&&ia!==shadow.activeElement)ia.value=ma;
  if(ib&&ib!==shadow.activeElement)ib.value=mb;
}

function renderSignupState(){
  var closed=!cfg.open;
  $('closed-card').style.display=closed?'block':'none';
  $('signup-wrap').style.display=closed?'none':'block';
  $('sig-sub').textContent=cfg.open?'People can register to pitch':'Registration closed — scoring still open';
  $('tog-sig').checked=cfg.open;
  renderSlots();
}

function qHtml(showRm){
  var by={a:[],b:[]};pitchers.forEach(function(p,i){by[p.slot||'a'].push({p:p,i:i});});
  var h='';['a','b'].forEach(function(s){
    var arr=by[s];if(!arr.length)return;
    h+='<div class="ssh">'+SLOTS[s].label+'</div>';
    arr.forEach(function(item){
      var p=item.p,i=item.i;
      var pill='<span class="pill '+(p.type==='investor'?'pill-i':'pill-f')+'">'+(p.type==='investor'?'Investor':'Founder')+'</span>';
      var rm=showRm?'<button class="rm" data-id="'+p.id+'">×</button>':'';
      h+='<div class="pi"><div class="pi-num">#'+(i+1)+'</div><div class="pi-info"><div class="pi-n">'+esc(p.name)+'</div><div class="pi-m">'+esc(p.company)+'</div></div>'+pill+rm+'</div>';
    });
  });
  return h||'<div class="ld">No pitchers yet — be the first!</div>';
}
function renderPubQ(){var el=$('pub-q');if(el)el.innerHTML=qHtml(false);}
function renderHostQ(){
  var el=$('host-q');if(!el)return;
  el.innerHTML=pitchers.length?qHtml(true):'<div class="ld">No pitchers signed up yet</div>';
  // Wire remove buttons
  el.querySelectorAll('.rm').forEach(function(btn){
    btn.onclick=function(){removePitcher(btn.dataset.id);};
  });
}
function renderScSel(){
  var sel=$('sc-sel');if(!sel)return;var cur=sel.value;
  sel.innerHTML='<option value="">— choose pitcher —</option>';
  ['a','b'].forEach(function(s){
    var arr=pitchers.filter(function(p){return(p.slot||'a')===s;});if(!arr.length)return;
    var og=document.createElement('optgroup');og.label=SLOTS[s].label;
    arr.forEach(function(p){var i=pitchers.indexOf(p),o=document.createElement('option');o.value=p.id;o.textContent='#'+(i+1)+' '+p.name+' · '+p.company+' ('+(p.type==='investor'?'Investor':'Founder')+')';og.appendChild(o);});
    sel.appendChild(og);
  });if(cur)sel.value=cur;
}

async function poll(){
  try{
    var cd=await api('Config');
    cd.records.forEach(function(r){var k=r.fields.Key,v=r.fields.Value;
      if(k==='signupsOpen'){var was=cfg.open;cfg.open=v==='true';cfg.rSig=r.id;if(was!==cfg.open)renderSignupState();}
      if(k==='maxA'){var wa=cfg.maxA;cfg.maxA=parseInt(v)||5;cfg.rA=r.id;if(wa!==cfg.maxA){renderSlots();renderStats();}}
      if(k==='maxB'){var wb=cfg.maxB;cfg.maxB=parseInt(v)||5;cfg.rB=r.id;if(wb!==cfg.maxB){renderSlots();renderStats();}}
    });
    var pd=await api('Pitchers?sort%5B0%5D%5Bfield%5D=Name');
    var np=pd.records.map(function(r){return{id:r.id,name:r.fields.Name||'',company:r.fields.Company||'',type:r.fields.Type||'founder',slot:r.fields.Slot||'a'};});
    if(JSON.stringify(np.map(function(p){return p.id;}))!==JSON.stringify(pitchers.map(function(p){return p.id;}))){pitchers=np;renderPubQ();renderHostQ();renderScSel();renderSlots();renderStats();}
    var sd=await api('Scores');
    sd.records.forEach(function(r){if(!seen.has(r.id)){seen.add(r.id);var f=r.fields;addNotif('<strong>'+esc(f.Scorer||'Someone')+'</strong> scored <strong>'+esc(f.PitcherName||'?')+'</strong> — Overall '+(f.Overall||0)+', Delivery '+(f.Delivery||0)+(f.Extra>0?', +'+f.Extra+' extra':''));}});
    $('sd').className='sync-dot live';
    $('last-sync').textContent='Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }catch(e){$('sd').className='sync-dot';}
}

async function registerPitcher(){
  if(!cfg.open){setSt('reg-st','Sign-ups are currently closed','err');return;}
  var name=$('rn').value.trim(),company=$('rc').value.trim();
  if(!name){setSt('reg-st','Please enter your name','err');return;}
  if(!company){setSt('reg-st','Please enter your company or fund','err');return;}
  if(!selType){setSt('reg-st','Please select Founder or Investor','err');return;}
  if(!selSlot){setSt('reg-st','Please choose a time slot','err');return;}
  if(cnt(selSlot)>=(selSlot==='a'?cfg.maxA:cfg.maxB)){setSt('reg-st','That slot just filled up!','err');return;}
  var btn=$('reg-btn');btn.disabled=true;btn.textContent='Saving...';
  try{
    await api('Pitchers',{method:'POST',body:JSON.stringify({records:[{fields:{Name:name,Company:company,Type:selType,Slot:selSlot}}]})});
    setSt('reg-st','Registered! See you on stage 🎤','ok');
    $('rn').value='';$('rc').value='';selSlot=null;selType=null;
    $('t-founder').classList.remove('sel');$('t-investor').classList.remove('sel');
    await loadPitchers();
  }catch(e){setSt('reg-st','Error: '+e.message,'err');}
  btn.disabled=false;btn.textContent='Add Me to the List →';
}

async function removePitcher(id){
  if(!confirm('Remove this pitcher?'))return;
  try{await api('Pitchers/'+id,{method:'DELETE'});await loadPitchers();}catch(e){alert(e.message);}
}

async function submitScore(){
  var pid=$('sc-sel').value;
  if(!pid){setSt('sc-st','Please select a pitcher','err');return;}
  var overall=parseInt($('sl-overall').value),delivery=parseInt($('sl-delivery').value),extra=parseInt($('sl-extra').value);
  var reason=$('extra-rsn').value.trim(),scorer=$('scr-name').value.trim()||'Anonymous';
  var p=pitchers.find(function(x){return x.id===pid;});
  var btn=$('sc-btn');btn.disabled=true;btn.textContent='Submitting...';
  try{
    var res=await api('Scores',{method:'POST',body:JSON.stringify({records:[{fields:{PitcherId:pid,PitcherName:p?p.name:'',Overall:overall,Delivery:delivery,Extra:extra,Reason:reason,Scorer:scorer}}]})});
    seen.add(res.records[0].id);
    setSt('sc-st','Score submitted!','ok');
    addNotif('<strong>'+esc(scorer)+'</strong> scored <strong>'+esc(p?p.name:'?')+'</strong> — Overall '+overall+', Delivery '+delivery+(extra>0?', +'+extra+' extra'+(reason?' "'+reason.slice(0,30)+'"':''):''));
    $('sl-overall').value=5;$('v-overall').textContent=5;
    $('sl-delivery').value=5;$('v-delivery').textContent=5;
    $('sl-extra').value=0;$('v-extra').textContent=0;
    $('extra-rsn').value='';$('sc-sel').value='';renderTicks();
  }catch(e){setSt('sc-st','Error: '+e.message,'err');}
  btn.disabled=false;btn.textContent='Submit Score →';
}

async function showResults(){
  var btn=$('calc-btn');btn.disabled=true;btn.textContent='Calculating...';
  try{
    var sd=await api('Scores'),scores=sd.records.map(function(r){return r.fields;});
    var res=pitchers.map(function(p){
      var pv=scores.filter(function(s){return s.PitcherId===p.id;});
      if(!pv.length)return{p:p,avg:0,votes:0,o:0,d:0,e:0,reasons:[]};
      var so=0,sd2=0,se=0,reasons=[];
      pv.forEach(function(v){so+=v.Overall||0;sd2+=v.Delivery||0;se+=v.Extra||0;if(v.Reason)reasons.push(v.Reason);});
      var n=pv.length;
      return{p:p,avg:Math.round(((so+sd2+se)/n)*10)/10,votes:n,o:Math.round(so/n*10)/10,d:Math.round(sd2/n*10)/10,e:Math.round(se/n*10)/10,reasons:reasons};
    });
    res.sort(function(a,b){return b.avg-a.avg;});
    var wb=$('winner-div');
    if(res.length&&res[0].votes>0){wb.innerHTML='<div class="wb"><div class="wb-l">Winner</div><div class="wb-n">'+esc(res[0].p.name)+'</div><div class="wb-c">'+esc(res[0].p.company)+' · '+(res[0].p.type==='investor'?'Investor':'Founder')+'</div><div class="wb-s">Avg '+res[0].avg.toFixed(1)+' pts · '+res[0].votes+' vote'+(res[0].votes>1?'s':'')+'</div></div>';}
    else{wb.innerHTML='<div class="ld">No scores yet</div>';}
    $('rl').innerHTML=res.map(function(r,i){
      var cls=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      var rr=r.reasons.length?'<div style="font-size:10px;color:var(--gold);font-family:var(--mono);margin-top:3px">✦ '+r.reasons.map(esc).join(' · ')+'</div>':'';
      return '<div class="rc'+(i===0?' win':'')+'"><div class="rk '+cls+'">'+(i+1)+'</div><div class="ri"><div class="ri-n">'+esc(r.p.name)+'</div><div class="ri-m">'+esc(r.p.company)+' · '+(r.p.type==='investor'?'Investor':'Founder')+' · '+SLOTS[r.p.slot||'a'].short+'</div>'+rr+'</div><div class="rs"><div class="rs-t">'+r.avg.toFixed(1)+'</div><div class="rs-b">'+r.o.toFixed(1)+' · '+r.d.toFixed(1)+(r.e>0?' · +'+r.e.toFixed(1)+'✦':'')+' · '+r.votes+'v</div></div></div>';
    }).join('');
    $('results').style.display='block';
  }catch(e){alert('Error: '+e.message);}
  btn.disabled=false;btn.textContent='Calculate Results →';
}

function addNotif(msg){notifs.unshift({msg:msg,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});renderNotifs();}
function renderNotifs(){
  $('n-cnt').textContent=notifs.length;
  if(!notifs.length){$('nfeed').innerHTML='<div class="ne">Waiting for activity...</div>';return;}
  $('nfeed').innerHTML=notifs.slice(0,20).map(function(n){return '<div class="ni"><div class="ni-dot"></div><div class="ni-txt">'+n.msg+'</div><div class="ni-t">'+n.time+'</div></div>';}).join('');
}

function tryHost(){if(hostUnlocked){exitHost();return;}$('po').style.display='flex';$('pc-in').value='';$('pc-err').textContent='';setTimeout(function(){$('pc-in').focus();},100);}
function checkPasscode(){if($('pc-in').value.trim().toLowerCase()===PASSCODE){hostUnlocked=true;$('po').style.display='none';enterHost();}else{$('pc-err').textContent='Wrong passcode';$('pc-in').value='';$('pc-in').focus();}}
function enterHost(){$('hbtn').textContent='← Back';$('v-audience').classList.remove('on');$('v-host').classList.add('on');}
function exitHost(){hostUnlocked=false;$('hbtn').textContent='Host View';$('v-host').classList.remove('on');$('v-audience').classList.add('on');}

function buildTicks(id,min,max,val){var el=$(id);if(!el)return;var h='';for(var i=min;i<=max;i++)h+='<div class="tick'+(i==val?' on':'')+'">'+i+'</div>';el.innerHTML=h;}
function renderTicks(){
  buildTicks('tk-overall',1,10,parseInt($('sl-overall').value));
  buildTicks('tk-delivery',1,10,parseInt($('sl-delivery').value));
  buildTicks('tk-extra',0,10,parseInt($('sl-extra').value));
}
function updateSlider(id,isExtra){
  var sl=$(id==='overall'?'sl-overall':id==='delivery'?'sl-delivery':'sl-extra');
  var val=parseInt(sl.value);
  $('v-'+id).textContent=val;
  buildTicks('tk-'+id,isExtra?0:1,10,val);
}
function setSt(id,msg,type){var el=$(id);el.textContent=msg;el.className='st'+(type?' '+type:'');if(type==='ok')setTimeout(function(){el.textContent='';el.className='st';},3000);}
function switchTab(tab){
  $('t-signup').classList.toggle('on',tab==='signup');$('t-score').classList.toggle('on',tab==='score');
  $('p-signup').style.display=tab==='signup'?'block':'none';$('p-score').style.display=tab==='score'?'block':'none';
  if(tab==='score')loadPitchers();
}

wire();
renderTicks();
loadConfig().then(function(){renderSignupState();loadPitchers();setInterval(poll,8000);poll();});
</script>
